service: product-analysis-api
frameworkVersion: "4"

plugins:
  - serverless-esbuild

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  httpApi:
    cors:
      allowedOrigins:
        - "*"
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - OPTIONS
  environment:
    TABLE_NAME: ${self:service}-${self:provider.stage}
    BUCKET_NAME: ${self:service}-${self:provider.stage}-uploads
    OPENAI_MODEL: gpt-4o
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:Query
            - dynamodb:DeleteItem
            - dynamodb:BatchWriteItem
            - dynamodb:Scan
          Resource:
            - !GetAtt ProductsTable.Arn
            - !Sub "${ProductsTable.Arn}/index/*"
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
          Resource:
            - !Sub "arn:aws:s3:::${UploadsBucket}/*"

functions:
  analyzeProduct:
    handler: src/handlers/analyzeProduct.handler
    timeout: 120
    memorySize: 2048
    events:
      - httpApi:
          path: /analyze-product
          method: post
  getUploadUrl:
    handler: src/handlers/getUploadUrl.handler
    timeout: 10
    events:
      - httpApi:
          path: /upload-url
          method: post
  evaluateShoppingList:
    handler: src/handlers/evaluateShoppingList.handler
    timeout: 10
    events:
      - httpApi:
          path: /shopping-list/evaluate
          method: post
  getUserDashboard:
    handler: src/handlers/getUserDashboard.handler
    timeout: 10
    events:
      - httpApi:
          path: /dashboard
          method: get
  getProduct:
    handler: src/handlers/getProduct.handler
    timeout: 10
    events:
      - httpApi:
          path: /product
          method: get
  addShoppingListItem:
    handler: src/handlers/addShoppingListItem.handler
    timeout: 10
    events:
      - httpApi:
          path: /shopping-list/items
          method: post
  resetUserSession:
    handler: src/handlers/resetUserSession.handler
    timeout: 30
    events:
      - httpApi:
          path: /shopping-list/reset
          method: post
  regradeProducts:
    handler: src/handlers/regradeProducts.handler
    timeout: 300
    memorySize: 1024
    environment:
      REGRADE_DELAY_MS: "1500"

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    concurrency: 8
    external:
      - aws-sdk

resources:
  Resources:
    ProductsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.TABLE_NAME}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: GSI1PK
            AttributeType: S
          - AttributeName: GSI1SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - AttributeName: GSI1PK
                KeyType: HASH
              - AttributeName: GSI1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    UploadsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:provider.environment.BUCKET_NAME}
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256

    UploadsBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref UploadsBucket
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Sid: DenyNonTlsRequests
              Effect: Deny
              Principal: "*"
              Action: "s3:*"
              Resource:
                - !Sub "arn:aws:s3:::${UploadsBucket}"
                - !Sub "arn:aws:s3:::${UploadsBucket}/*"
              Condition:
                Bool:
                  aws:SecureTransport: "false"
