# Genera el AAB de release y lo sube a una pista de Google Play (p. ej. internal).
#
# Prerrequisitos en Google Play Console:
# - Cuenta de servicio JSON con rol "Release apps" vinculada al proyecto (API habilitada).
# - La app y la pista (internal / closed) ya creadas.
#
# Secretos sugeridos:
#   PLAY_SERVICE_ACCOUNT_JSON  → contenido completo del JSON de la cuenta de servicio
#   ANDROID_KEYSTORE_BASE64  → keystore en base64 (si firmas en CI)
#   ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
#
# Si aún no tienes signingConfig de release en app/build.gradle.kts, añádelo leyendo
# las contraseñas desde env o desde archivo generado en el job.

name: Android — Bundle release → Play (internal)

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 no definido: configura firma o este paso fallará."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks

      - name: Build release bundle
        env:
          HEXAMINER_API_BASE_URL: ${{ vars.HEXAMINER_API_BASE_URL }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/release-keystore.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      # Alternativa estable: r0adkll/upload-google-play (revisa la versión en el marketplace)
      - uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.hexaminer.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
